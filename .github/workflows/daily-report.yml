name: Relationship Daily Report

on:
  schedule:
    - cron: "0 4 * * *" # UTC 04:00 = 台北時間 12:00
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> $GITHUB_OUTPUT
          fi
          echo "Date: $(cat $GITHUB_OUTPUT | grep target | cut -d= -f2)"

      - name: Fetch papers from PubMed
        run: |
          node scripts/fetch_papers.mjs \
            --days=7 \
            --max-papers=60 \
            --output=papers.json
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(node -e "const d=require('./papers.json'); console.log(d.count)")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo '{"date":"${{ steps.date.outputs.target }}","count":0,"papers":[]}' > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          node scripts/generate_report.mjs \
            --input=papers.json \
            --output=docs/relationship-${{ steps.date.outputs.target }}.html

      - name: Generate index page
        run: node scripts/generate_index.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ seen_pmids.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📄 relationship daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true

      - name: Summary
        run: |
          echo "### 💑 Relationship Mind Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.date.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** [relationship-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/relationship-mind/relationship-${{ steps.date.outputs.target }}.html)" >> $GITHUB_STEP_SUMMARY
